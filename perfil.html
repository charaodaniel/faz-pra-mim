<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Perfil Profissional - Faz pra mim</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: { primary: "#630ed4", "primary-container": "#7c3aed", background: "#fef7ff" },
        fontFamily: { sans: ["Inter"] }
      }
    }
  }
</script>
</head>
<body class="bg-background font-sans">
<header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md shadow-sm">
  <div class="flex justify-between items-center px-6 md:px-10 h-16 max-w-7xl mx-auto">
    <a href="/" class="text-xl font-bold text-primary">← Voltar</a>
    <div class="text-xl font-bold text-primary">Faz pra mim</div>
    <div class="w-20"></div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-6 md:px-10 pt-24 pb-16">
  <div id="profileContent" class="text-center py-10">Carregando perfil...</div>
</main>

<script>
  const id = window.location.pathname.split('/').pop();
  
  async function loadProfile() {
    try {
      const res = await axios.get(`/api/freelancers/${id}`);
      const p = res.data;
      
      if (!p) {
        document.getElementById('profileContent').innerHTML = '<div class="text-center py-10">Profissional não encontrado</div>';
        return;
      }
      
      document.getElementById('profileContent').innerHTML = `
        <div class="bg-white rounded-xl p-6 md:p-8 shadow-sm border mb-6">
          <div class="flex flex-col md:flex-row gap-6 items-center md:items-start">
            <div class="w-32 h-32 rounded-full bg-primary/20 text-primary flex items-center justify-center text-4xl font-bold">${p.name.charAt(0)}</div>
            <div class="flex-1 text-center md:text-left">
              <div class="flex flex-wrap items-center justify-center md:justify-start gap-2 mb-2">
                <h1 class="text-3xl font-bold">${p.name}</h1>
                ${p.is_verified ? '<span class="bg-green-100 text-green-700 px-2 py-1 rounded-full text-sm">✓ Verificado</span>' : ''}
              </div>
              <p class="text-xl text-primary mb-2">${p.title}</p>
              <div class="flex flex-wrap justify-center md:justify-start gap-4 text-sm text-on-surface-variant mb-4">
                <span>⭐ ${p.rating || 0} (${p.review_count || 0} avaliações)</span>
                <span>📍 ${p.city || 'Não informado'}</span>
                <span>💼 ${p.category}</span>
              </div>
              <div class="flex gap-3 justify-center md:justify-start">
                <button onclick="alert('Email: ${p.email}')" class="px-6 py-2 bg-primary text-white rounded-lg hover:shadow-lg">📧 Contatar</button>
                ${p.phone ? `<button onclick="alert('Telefone: ${p.phone}')" class="px-6 py-2 border border-primary text-primary rounded-lg hover:bg-primary/5">📞 WhatsApp</button>` : ''}
              </div>
            </div>
          </div>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <div class="lg:col-span-2 space-y-6">
            <div class="bg-white rounded-xl p-6 shadow-sm border">
              <h2 class="text-xl font-bold mb-4">Sobre</h2>
              <p class="text-on-surface-variant leading-relaxed">${p.description || 'Sem descrição'}</p>
              ${p.price_hourly ? `<div class="mt-4 p-4 bg-primary/5 rounded-lg"><span class="font-bold">💰 Preço por hora:</span> R$ ${p.price_hourly}</div>` : ''}
            </div>
            
            <div class="bg-white rounded-xl p-6 shadow-sm border">
              <h2 class="text-xl font-bold mb-4">Avaliações (${p.reviews?.length || 0})</h2>
              <div id="reviewsList">
                ${p.reviews?.length > 0 ? p.reviews.map(r => `
                  <div class="border-b py-4 last:border-0">
                    <div class="flex justify-between items-start mb-2">
                      <span class="font-bold">${r.client_name}</span>
                      <span class="text-yellow-500">${'⭐'.repeat(r.rating)}</span>
                    </div>
                    <p class="text-on-surface-variant">${r.comment || 'Sem comentário'}</p>
                    <span class="text-xs text-on-surface-variant">${new Date(r.created_at).toLocaleDateString('pt-BR')}</span>
                  </div>
                `).join('') : '<p class="text-on-surface-variant">Ainda não há avaliações</p>'}
              </div>
            </div>
          </div>
          
          <div class="space-y-6">
            <div class="bg-white rounded-xl p-6 shadow-sm border sticky top-24">
              <h2 class="text-xl font-bold mb-4">Deixe sua avaliação</h2>
              <form id="reviewForm">
                <input type="text" id="clientName" placeholder="Seu nome" class="w-full px-4 py-2 border rounded-lg mb-3" required>
                <select id="rating" class="w-full px-4 py-2 border rounded-lg mb-3" required>
                  <option value="">Selecione a nota</option>
                  <option value="5">⭐⭐⭐⭐⭐ - Excelente</option>
                  <option value="4">⭐⭐⭐⭐ - Muito bom</option>
                  <option value="3">⭐⭐⭐ - Bom</option>
                  <option value="2">⭐⭐ - Regular</option>
                  <option value="1">⭐ - Ruim</option>
                </select>
                <textarea id="comment" rows="3" placeholder="Seu comentário..." class="w-full px-4 py-2 border rounded-lg mb-3"></textarea>
                <button type="submit" class="w-full py-3 bg-primary text-white rounded-lg font-bold hover:shadow-lg">Enviar Avaliação</button>
              </form>
            </div>
          </div>
        </div>
      `;
      
      document.getElementById('reviewForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const client_name = document.getElementById('clientName').value;
        const rating = document.getElementById('rating').value;
        const comment = document.getElementById('comment').value;
        
        try {
          await axios.post(`/api/freelancers/${id}/review`, { client_name, rating, comment });
          alert('Avaliação enviada com sucesso!');
          location.reload();
        } catch(err) {
          alert('Erro ao enviar avaliação');
        }
      });
      
    } catch(e) {
      console.error(e);
      document.getElementById('profileContent').innerHTML = '<div class="text-center py-10 text-red-500">Erro ao carregar perfil</div>';
    }
  }
  
  loadProfile();
</script>
</body>
</html>
