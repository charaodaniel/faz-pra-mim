<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Panel | Faz pra mim</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body class="bg-gray-100">

<nav class="bg-white shadow-sm fixed top-0 w-full z-50">
  <div class="flex justify-between items-center px-6 h-16 max-w-7xl mx-auto">
    <div class="text-xl font-bold text-primary">🔧 Faz pra mim - Admin</div>
    <div class="flex items-center gap-4">
      <span class="text-sm text-gray-600">admin@fazpramim.com</span>
      <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-lg text-sm hover:bg-red-600">Sair</button>
    </div>
  </div>
</nav>

<main class="pt-20 px-6 max-w-7xl mx-auto pb-12">
  <h1 class="text-3xl font-bold mb-2">Painel Administrativo</h1>
  <p class="text-gray-600 mb-8">Gerencie usuários, projetos e configurações da plataforma</p>
  
  <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
    <div class="bg-white p-6 rounded-xl shadow-sm border">
      <div class="text-2xl font-bold text-primary" id="totalUsers">-</div>
      <div class="text-gray-500 text-sm">Usuários</div>
    </div>
    <div class="bg-white p-6 rounded-xl shadow-sm border">
      <div class="text-2xl font-bold text-primary" id="totalProfissionais">-</div>
      <div class="text-gray-500 text-sm">Profissionais</div>
    </div>
    <div class="bg-white p-6 rounded-xl shadow-sm border">
      <div class="text-2xl font-bold text-primary" id="totalProjetos">-</div>
      <div class="text-gray-500 text-sm">Projetos</div>
    </div>
    <div class="bg-white p-6 rounded-xl shadow-sm border">
      <div class="text-2xl font-bold text-primary" id="totalAvaliacoes">-</div>
      <div class="text-gray-500 text-sm">Avaliações</div>
    </div>
  </div>
  
  <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
    <div class="p-4 border-b bg-gray-50 font-bold">📋 Últimos Usuários Cadastrados</div>
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead class="bg-gray-50 border-b">
          <tr>
            <th class="p-3 text-left text-sm font-semibold">Nome</th>
            <th class="p-3 text-left text-sm font-semibold">Email</th>
            <th class="p-3 text-left text-sm font-semibold">Tipo</th>
            <th class="p-3 text-left text-sm font-semibold">Status</th>
            <th class="p-3 text-left text-sm font-semibold">Ações</th>
          </tr>
        </thead>
        <tbody id="usersTable"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
async function loadStats() {
  const res = await fetch('/api/admin/stats');
  const data = await res.json();
  document.getElementById('totalUsers').innerText = data.totalUsers || 0;
  document.getElementById('totalProfissionais').innerText = data.totalFreelancers || 0;
  document.getElementById('totalProjetos').innerText = data.totalProjects || 0;
  document.getElementById('totalAvaliacoes').innerText = data.totalReviews || 0;
}

async function loadUsers() {
  const res = await fetch('/api/admin/users');
  const users = await res.json();
  document.getElementById('usersTable').innerHTML = users.slice(0, 10).map(u => `
    <tr class="border-b hover:bg-gray-50">
      <td class="p-3">${u.name}</td>
      <td class="p-3 text-sm text-gray-600">${u.email}</td>
      <td class="p-3"><span class="px-2 py-1 rounded text-xs font-semibold ${u.role === 'dev' ? 'bg-purple-100 text-purple-700' : u.role === 'admin' ? 'bg-blue-100 text-blue-700' : u.role === 'profissional' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-700'}">${u.role}</span></td>
      <td class="p-3"><span class="px-2 py-1 rounded text-xs font-semibold ${u.is_active ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${u.is_active ? 'Ativo' : 'Inativo'}</span></td>
      <td class="p-3">
        <button onclick="toggleUser(${u.id}, ${u.is_active})" class="text-sm text-primary hover:underline">${u.is_active ? 'Desativar' : 'Ativar'}</button>
      </td>
    </tr>
  `).join('');
}

async function toggleUser(id, currentStatus) {
  const res = await fetch('/api/admin/users/toggle', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id: id, active: currentStatus ? 0 : 1 })
  });
  if (res.ok) {
    loadUsers();
    loadStats();
  }
}

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login';
}

loadStats();
loadUsers();
</script>
</body>
</html>
