<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login | Faz pra mim</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
<div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
  <div class="bg-primary p-6 text-center"><div class="text-3xl font-bold text-white">🔧 Faz pra mim</div><p class="text-purple-200 mt-1">Sua plataforma de serviços</p></div>
  
  <div class="p-8">
    <div class="flex gap-2 mb-6 border-b">
      <button class="tab-btn flex-1 py-3 text-center font-semibold text-primary border-b-2 border-primary" data-tab="login">Entrar</button>
      <button class="tab-btn flex-1 py-3 text-center font-semibold text-gray-500" data-tab="register">Cadastrar</button>
    </div>
    
    <!-- Login Form -->
    <div id="loginForm" class="tab-content">
      <form onsubmit="handleLogin(event)">
        <div class="mb-4"><label class="block text-sm font-medium mb-2">E-mail</label><input type="email" id="loginEmail" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="seu@email.com" required/></div>
        <div class="mb-6"><label class="block text-sm font-medium mb-2">Senha</label><input type="password" id="loginPassword" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-primary" placeholder="••••••" required/></div>
        <button type="submit" class="w-full bg-primary text-white py-3 rounded-lg font-semibold hover:bg-primary/90 transition">Entrar</button>
      </form>
      <div class="mt-4 text-center text-sm text-gray-500">Demo: carlos@exemplo.com / 123456</div>
    </div>
    
    <!-- Register Form -->
    <div id="registerForm" class="tab-content hidden">
      <form onsubmit="handleRegister(event)">
        <div class="mb-3"><label class="block text-sm font-medium mb-2">Nome completo</label><input type="text" id="regName" class="w-full p-3 border rounded-lg" required/></div>
        <div class="mb-3"><label class="block text-sm font-medium mb-2">E-mail</label><input type="email" id="regEmail" class="w-full p-3 border rounded-lg" required/></div>
        <div class="mb-3"><label class="block text-sm font-medium mb-2">Senha</label><input type="password" id="regPassword" class="w-full p-3 border rounded-lg" required minlength="6"/></div>
        <div class="mb-3"><label class="block text-sm font-medium mb-2">Telefone</label><input type="tel" id="regPhone" class="w-full p-3 border rounded-lg" placeholder="(11) 99999-9999"/></div>
        <div class="mb-4"><label class="block text-sm font-medium mb-2">Tipo de conta</label><select id="regType" class="w-full p-3 border rounded-lg"><option value="cliente">👤 Cliente - Quero contratar serviços</option><option value="freelancer">💼 Freelancer/PJ - Quero oferecer serviços</option></select></div>
        <button type="submit" class="w-full bg-primary text-white py-3 rounded-lg font-semibold hover:bg-primary/90 transition">Criar conta</button>
      </form>
    </div>
  </div>
</div>

<script>
async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = data.redirect;
    } else {
      alert(data.error);
    }
  } catch (error) {
    alert('Erro ao fazer login');
  }
}

async function handleRegister(e) {
  e.preventDefault();
  const data = {
    name: document.getElementById('regName').value,
    email: document.getElementById('regEmail').value,
    password: document.getElementById('regPassword').value,
    phone: document.getElementById('regPhone').value,
    user_type: document.getElementById('regType').value
  };
  
  try {
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const result = await res.json();
    if (result.success) {
      window.location.href = result.redirect;
    } else {
      alert(result.error);
    }
  } catch (error) {
    alert('Erro ao cadastrar');
  }
}

// Tabs
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-content').forEach(content => content.classList.add('hidden'));
    document.getElementById(tab === 'login' ? 'loginForm' : 'registerForm').classList.remove('hidden');
    document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('text-primary', 'border-primary'); b.classList.add('text-gray-500', 'border-transparent'); });
    btn.classList.add('text-primary', 'border-primary');
    btn.classList.remove('text-gray-500');
  });
});
</script>
</body>
</html>
