<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dashboard - Faz pra mim</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = { theme: { extend: { colors: { primary: "#630ed4" }, fontFamily: { sans: ["Inter"] } } } }
</script>
</head>
<body class="bg-gray-50 font-sans">
<div class="flex h-screen">
  <aside class="w-64 bg-white border-r p-6 hidden md:block">

    <nav class="space-y-2">
      <a href="#" class="block py-2 px-4 bg-primary/10 text-primary rounded-lg">Dashboard</a>

  </aside>
  <main class="flex-1 overflow-auto p-6 md:p-8">

      <div class="space-y-3">
        <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg"><span>Mariana Souza</span><button class="text-primary">Responder</button></div>
        <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg"><span>TechFlow Solutions</span><button class="text-primary">Responder</button></div>
      </div>
    </div>
